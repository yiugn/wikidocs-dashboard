name: Publish Wikidocs Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wikidocs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect Wikidocs stats and export static site
        env:
          WIKIDOCS_TOKENS: ${{ secrets.WIKIDOCS_TOKENS }}
          WIKIDOCS_MAX_PAGES: "0"
        run: |
          if ! python export_static.py --collect; then
            echo "::warning::Live Wikidocs collection failed. Publishing the latest committed dashboard data instead."
            python export_static.py
          fi

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/snapshots.jsonl data/daily_blog_views.csv data/daily_cumulative_views.csv
          git diff --cached --quiet || git commit -m "Update Wikidocs dashboard data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
